# Dev compose. Hot-reload backend + admin. Flutter runs off-host.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gympass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-gympass}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gympass} -d ${POSTGRES_DB:-gympass}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Adminer — single-PHP-file DB browser. Reachable at
  # http://localhost:8080 once `docker compose up -d adminer` has
  # run. Login form prefills via `ADMINER_DEFAULT_SERVER=db`; use
  # the same `POSTGRES_USER` / `POSTGRES_PASSWORD` / `POSTGRES_DB`
  # from `.env` to log in. Profile-only — not part of any prod
  # compose; if you ever publish the dev compose to a server, drop
  # this service first.
  adminer:
    image: adminer:4-standalone
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
      # `pepa-linha-dark` is the cleanest dark theme that ships with
      # the official image; matches the rest of the dev tooling so
      # the eye doesn't switch register.
      ADMINER_DESIGN: pepa-linha-dark
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command:
      - sh
      - -c
      - |
        uv run alembic upgrade head &&
        uv run python -m scripts.seed &&
        exec uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
    command: ["uv", "run", "celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info"]
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
    command: ["uv", "run", "celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy

  admin:
    build:
      context: ./admin
      target: dev
    env_file:
      - path: .env
        required: false
    environment:
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_API_URL: http://backend:8000
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret-min-16-chars-please}
      # MUST match backend env exactly. Dev default lives here (and
      # in .env.example) so production deploys are forced to set it.
      ADMIN_EXCHANGE_SECRET: ${ADMIN_EXCHANGE_SECRET:-changeme-admin-exchange-secret-dev-only}
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      - backend

  gym-partner:
    build:
      context: ./gym-partner
      target: dev
    env_file:
      - path: .env
        required: false
    environment:
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_API_URL: http://backend:8000
      NEXTAUTH_URL: http://localhost:3003
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret-change-me}
      ADMIN_EXCHANGE_SECRET: ${ADMIN_EXCHANGE_SECRET:-changeme-admin-exchange-secret-dev-only}
    volumes:
      - ./gym-partner:/app
      - gym_partner_node_modules:/app/node_modules
    ports:
      - "3003:3003"
    depends_on:
      - backend

  # Public marketing site — apex domain (gym-pass.net). No backend
  # dependency at runtime: the marketing surface is static / ISR and
  # links to api/admin/partner subdomains by URL only. Bind-mounted
  # for hot reload like the other Next services.
  website:
    build:
      context: ./website
      target: dev
    environment:
      NODE_ENV: development
    volumes:
      - ./website:/app
      - website_node_modules:/app/node_modules
    ports:
      - "3004:3004"

volumes:
  db_data:
  admin_node_modules:
  gym_partner_node_modules:
  website_node_modules:
  media_data:
