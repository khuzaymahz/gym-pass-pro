# Staging overlay. Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml \
#                  --env-file .env.staging up -d --build
#
# Staging lives on a single VM under the stg.gym-pass.net DNS zone:
#   stg.gym-pass.net           → website
#   stg-api.gym-pass.net       → backend
#   stg-admin.gym-pass.net     → admin
#   stg-partner.gym-pass.net   → gym-partner
#
# The Cloudflare Origin Cert that already serves *.gym-pass.net covers
# every stg-* subdomain, so the same cert mount serves both staging
# and (eventually) production — only the env-var-resolved hostnames
# in nginx vhost templates differ.
#
# Differences from the dev compose:
#   - db / redis / backend / admin / gym-partner / website all DROP
#     their host-published ports (`!reset []`). Only nginx publishes
#     80/443. Everything else is reachable only on the internal Docker
#     network. This is the load-bearing security boundary — if any of
#     these get re-published, raw Postgres / Redis / backend become
#     internet-reachable.
#   - APP_ENV is fixed to "staging". The backend's intent-named flags
#     (should_mock_sms, should_mock_payments, should_enforce_secret_strength)
#     turn on the production-shape behaviours while keeping SMS +
#     payments mocked per CLAUDE.md §15.
#   - certbot is gone. TLS is terminated with a Cloudflare Origin
#     Certificate mounted from ./nginx/certs (gitignored). Valid 15
#     years; no renewal automation needed.
#   - website service serves the marketing landing at stg.gym-pass.net,
#     plus the /downloads/gympass.apk artefact.

services:
  db:
    ports: !reset []
    restart: always

  redis:
    ports: !reset []
    restart: always

  backend:
    restart: always
    # gunicorn with uvicorn workers — 4 is right for the small staging
    # VM. Tune up only after observing CPU sat under load.
    command: ["uv", "run", "gunicorn", "app.main:app", "-k", "uvicorn.workers.UvicornWorker", "-b", "0.0.0.0:8000", "-w", "4", "--access-logfile", "-"]
    env_file:
      - .env.staging
    volumes:
      - media_data:/app/media
    ports: !reset []
    environment:
      APP_ENV: staging

  celery-worker:
    restart: always
    env_file:
      - .env.staging
    volumes: !reset []
    environment:
      APP_ENV: staging

  celery-beat:
    restart: always
    env_file:
      - .env.staging
    volumes: !reset []
    environment:
      APP_ENV: staging

  admin:
    build:
      context: ./admin
      target: runner
      # Build-time secrets — admin's lib/env.ts validates these via
      # Zod at module load; the build can't finish without them.
      # Not baked into the runtime bundle (the runner reads them
      # fresh from env_file at container start).
      args:
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        ADMIN_EXCHANGE_SECRET: ${ADMIN_EXCHANGE_SECRET}
    restart: always
    env_file:
      - .env.staging
    volumes: !reset []
    ports: !reset []
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN:-stg-api.gym-pass.net}
      BACKEND_API_URL: http://backend:8000
      NEXTAUTH_URL: https://${ADMIN_DOMAIN:-stg-admin.gym-pass.net}

  gym-partner:
    build:
      context: ./gym-partner
      target: runner
      args:
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        ADMIN_EXCHANGE_SECRET: ${ADMIN_EXCHANGE_SECRET}
    restart: always
    env_file:
      - .env.staging
    volumes: !reset []
    ports: !reset []
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN:-stg-api.gym-pass.net}
      NEXTAUTH_URL: https://${PARTNER_DOMAIN:-stg-partner.gym-pass.net}

  website:
    build:
      context: ./website
      target: runner
    restart: always
    volumes: !reset []
    ports: !reset []
    environment:
      NODE_ENV: production

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    # Resolve ${API_DOMAIN}/${ADMIN_DOMAIN}/${PARTNER_DOMAIN}/${WEBSITE_DOMAIN}
    # in the vhost templates at container start. The nginx official
    # image walks NGINX_ENVSUBST_TEMPLATE_DIR, applies envsubst with
    # NGINX_ENVSUBST_FILTER as a positive filter (so unrelated `$var`
    # references in Lua-style snippets aren't accidentally replaced),
    # and writes the rendered files into /etc/nginx/conf.d/.
    environment:
      NGINX_ENVSUBST_TEMPLATE_DIR: /etc/nginx/templates
      NGINX_ENVSUBST_TEMPLATE_SUFFIX: .template
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx/conf.d
      NGINX_ENVSUBST_FILTER: '^(API|ADMIN|PARTNER|WEBSITE)_DOMAIN$$'
      API_DOMAIN: ${API_DOMAIN:-stg-api.gym-pass.net}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-stg-admin.gym-pass.net}
      PARTNER_DOMAIN: ${PARTNER_DOMAIN:-stg-partner.gym-pass.net}
      WEBSITE_DOMAIN: ${WEBSITE_DOMAIN:-stg.gym-pass.net}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Templates rendered into /etc/nginx/conf.d at container start.
      # The dev compose mounts ./nginx/conf.d directly; for staging we
      # mount the templates so envsubst can rewrite hostnames per env.
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      # Cloudflare Origin Cert + private key, copied to the VM at
      # deploy time. Gitignored. Cert can be world-readable (0644);
      # key MUST be 0600 root:root (or the corresponding nginx user
      # inside the container). See docs/deploy.md.
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - admin
      - gym-partner
      - website
