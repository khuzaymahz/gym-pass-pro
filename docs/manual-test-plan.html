<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GymPass · Manual Test Plan</title>
<style>
  /* GymPass brand palette — kept in sync with mobile gp_tokens.dark */
  :root {
    --bg: #0a0b0a;
    --bg-2: #131414;
    --bg-3: #1c1d1c;
    --line: #25272a;
    --line-2: #34373b;
    --fg: #f4f4f1;
    --muted: #8a8d92;
    --muted-soft: #a8acb1;
    --lime: #d3ff3a;
    --lime-hi: #e3ff5e;
    --lime-shadow: rgba(211, 255, 58, 0.18);
    --amber: #f4b942;
    --red: #ef5350;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafaf9;
      --bg-2: #ffffff;
      --bg-3: #f0f0ec;
      --line: #e2e2dc;
      --line-2: #cbcbc4;
      --fg: #1a1a1a;
      --muted: #6a6d72;
      --muted-soft: #4a4d52;
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  .mono { font-family: ui-monospace, SFMono-Regular, "JetBrains Mono",
    Menlo, Consolas, monospace; }

  /* Sticky header with progress + controls */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(10px);
  }
  .header-row {
    max-width: 1100px;
    margin: 0 auto;
    padding: 14px 22px 12px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
  }
  .title {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.01em;
  }
  .title .accent {
    font-style: italic;
    font-weight: 900;
    color: var(--lime);
  }
  .sub {
    font-size: 11px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .spacer { flex: 1; }

  .progress-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 220px;
  }
  .progress-text {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    font-family: ui-monospace, monospace;
  }
  .progress-text strong { color: var(--fg); font-weight: 600; }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--bg-3);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--lime), var(--lime-hi));
    box-shadow: 0 0 12px var(--lime-shadow);
    width: 0%;
    transition: width 240ms cubic-bezier(0.22, 1, 0.36, 1);
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .search {
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--fg);
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 12.5px;
    outline: none;
    width: 220px;
    transition: border-color 120ms;
  }
  .search:focus { border-color: var(--lime); }
  .seg {
    display: inline-flex;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 2px;
    font-size: 11.5px;
  }
  .seg button {
    background: transparent;
    color: var(--muted);
    border: none;
    padding: 5px 11px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
    letter-spacing: 0.02em;
    transition: background-color 120ms, color 120ms;
  }
  .seg button:hover { color: var(--fg); }
  .seg button.active {
    background: var(--lime);
    color: #0a0b0a;
    font-weight: 600;
  }

  .btn {
    background: var(--bg-2);
    color: var(--fg);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: border-color 120ms, transform 90ms;
  }
  .btn:hover { border-color: var(--line-2); }
  .btn:active { transform: scale(0.97); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }

  /* Section nav strip */
  nav.sections {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 22px 12px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  nav.sections a {
    flex-shrink: 0;
    text-decoration: none;
    color: var(--muted);
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    letter-spacing: 0.04em;
    transition: color 120ms, border-color 120ms;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  nav.sections a:hover { color: var(--fg); border-color: var(--line-2); }
  nav.sections a .count {
    font-family: ui-monospace, monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 1px 5px;
    background: var(--bg-3);
    border-radius: 4px;
  }
  nav.sections a.section-done .count {
    background: var(--lime);
    color: #0a0b0a;
    font-weight: 600;
  }

  /* Body content */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 22px 22px 80px;
  }

  section {
    margin-bottom: 28px;
    scroll-margin-top: 140px;
  }
  section h2 {
    margin: 0 0 4px;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  section h2 .pill {
    font-family: ui-monospace, monospace;
    font-size: 10.5px;
    background: var(--bg-3);
    color: var(--muted);
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  section h2 .pill.done {
    background: var(--lime);
    color: #0a0b0a;
  }
  section p.section-sub {
    margin: 0 0 12px;
    color: var(--muted-soft);
    font-size: 12.5px;
  }

  ul.cases {
    list-style: none;
    margin: 0;
    padding: 0;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: var(--bg-2);
  }
  li.case {
    display: grid;
    grid-template-columns: 36px 70px 1fr 1fr;
    align-items: flex-start;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    gap: 12px;
    transition: background-color 120ms;
  }
  li.case:last-child { border-bottom: none; }
  li.case:hover { background: var(--bg-3); }
  li.case.done {
    background: linear-gradient(
      90deg,
      rgba(211, 255, 58, 0.04),
      transparent 80%
    );
  }
  li.case.done .scenario,
  li.case.done .expected {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--line-2);
  }
  li.case.hidden { display: none; }

  /* Custom checkbox — matches the brand lime */
  .check {
    position: relative;
    width: 20px;
    height: 20px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .check input {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--line-2);
    border-radius: 5px;
    background: var(--bg);
    cursor: pointer;
    margin: 0;
    transition: border-color 120ms, background-color 120ms;
  }
  .check input:hover { border-color: var(--lime); }
  .check input:checked {
    background: var(--lime);
    border-color: var(--lime);
  }
  .check input:checked + .tick {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }
  .tick {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.6) rotate(-12deg);
    transition: opacity 140ms, transform 140ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .tick svg { width: 13px; height: 13px; stroke: #0a0b0a; }

  .id-badge {
    font-family: ui-monospace, monospace;
    font-size: 11.5px;
    color: var(--muted);
    padding-top: 2px;
  }
  .scenario {
    font-size: 13px;
    line-height: 1.4;
    color: var(--fg);
  }
  .expected {
    font-size: 12.5px;
    line-height: 1.4;
    color: var(--muted-soft);
  }
  .expected strong { color: var(--fg); font-weight: 600; }

  /* Note row — separator + hint inside sections */
  .group-header {
    padding: 10px 14px 6px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--bg-3);
    border-bottom: 1px solid var(--line);
  }

  footer {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px 22px;
    color: var(--muted);
    font-size: 11.5px;
    border-top: 1px solid var(--line);
  }
  footer kbd {
    font-family: ui-monospace, monospace;
    background: var(--bg-3);
    border: 1px solid var(--line);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-3);
    color: var(--fg);
    border: 1px solid var(--line-2);
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 12.5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms, transform 200ms cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 720px) {
    li.case {
      grid-template-columns: 28px 56px 1fr;
    }
    li.case .expected {
      grid-column: 2 / -1;
      margin-top: 4px;
    }
    .search { width: 140px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <div class="title">GYM<span class="accent">PASS</span> · Test Plan</div>
      <div class="sub">Manual scenarios · check as you go</div>
    </div>
    <div class="spacer"></div>
    <div class="progress-wrap">
      <div class="progress-text">
        <span><strong id="done-count">0</strong> / <span id="total-count">0</span> done</span>
        <span id="pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    </div>
    <div class="controls">
      <input class="search" id="search" type="search" placeholder="Filter…" autocomplete="off" />
      <div class="seg" id="filter">
        <button data-filter="all" class="active">All</button>
        <button data-filter="pending">Pending</button>
        <button data-filter="done">Done</button>
      </div>
      <button class="btn" id="export-btn" title="Copy progress to clipboard">Export</button>
      <button class="btn btn-danger" id="reset-btn" title="Uncheck everything">Reset</button>
    </div>
  </div>
  <nav class="sections" id="section-nav"></nav>
</header>

<main id="content"></main>

<footer>
  Progress is saved locally in this browser (<span class="mono">localStorage</span>).
  Press <kbd>/</kbd> to focus the search · Tap a checkbox or its row to toggle.
</footer>

<div class="toast" id="toast"></div>

// ============================================================
// State + rendering
// ============================================================
const STORAGE_KEY = "gympass.testplan.v1";
const FILTER_KEY = "gympass.testplan.filter";
const SEARCH_KEY = "gympass.testplan.search";

let state = {};
let activeFilter = "all";
let activeSearch = "";

function loadState() {
  try {
    state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  } catch {
    state = {};
  }
  activeFilter = localStorage.getItem(FILTER_KEY) || "all";
  activeSearch = localStorage.getItem(SEARCH_KEY) || "";
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function allCases() {
  const out = [];
  for (const sec of SECTIONS) {
    if (sec.cases) sec.cases.forEach((c) => out.push({ sec, c }));
    if (sec.groups)
      for (const g of sec.groups) g.cases.forEach((c) => out.push({ sec, c, g }));
  }
  return out;
}

function sectionStats(sec) {
  let total = 0;
  let done = 0;
  const visit = (c) => {
    total++;
    if (state[c.id]) done++;
  };
  if (sec.cases) sec.cases.forEach(visit);
  if (sec.groups) sec.groups.forEach((g) => g.cases.forEach(visit));
  return { total, done };
}

// Substitute markdown-ish **bold** in scenarios.
function fmt(text) {
  return text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
}

function caseRow(c) {
  const checked = !!state[c.id];
  return `
    <li class="case ${checked ? "done" : ""}" data-id="${c.id}" data-search="${(
      c.id +
      " " +
      c.s +
      " " +
      c.e
    )
      .toLowerCase()
      .replace(/"/g, "")}">
      <label class="check">
        <input type="checkbox" data-id="${c.id}" ${checked ? "checked" : ""} />
        <span class="tick">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
            stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 8.5 6.5 12 13 4.5"></polyline>
          </svg>
        </span>
      </label>
      <span class="id-badge">${c.id}</span>
      <span class="scenario">${fmt(c.s)}</span>
      <span class="expected">${fmt(c.e)}</span>
    </li>
  `;
}

function renderSection(sec) {
  const stats = sectionStats(sec);
  const pillCls = stats.done === stats.total && stats.total > 0 ? "pill done" : "pill";
  let inner = "";
  if (sec.cases) {
    inner = `<ul class="cases">${sec.cases.map(caseRow).join("")}</ul>`;
  } else if (sec.groups) {
    inner = `<ul class="cases">
      ${sec.groups
        .map(
          (g) =>
            `<li class="group-header">${g.label}</li>` +
            g.cases.map(caseRow).join("")
        )
        .join("")}
    </ul>`;
  }
  return `
    <section id="${sec.id}">
      <h2>
        <span>${sec.num} · ${sec.title}</span>
        <span class="${pillCls}" data-stats="${sec.id}">${stats.done}/${stats.total}</span>
      </h2>
      ${sec.sub ? `<p class="section-sub">${sec.sub}</p>` : ""}
      ${inner}
    </section>
  `;
}

function renderNav() {
  const nav = document.getElementById("section-nav");
  nav.innerHTML = SECTIONS.map((sec) => {
    const stats = sectionStats(sec);
    const cls = stats.done === stats.total && stats.total > 0 ? "section-done" : "";
    return `<a href="#${sec.id}" class="${cls}">${sec.num}. ${sec.title}<span class="count" data-nav-stats="${sec.id}">${stats.done}/${stats.total}</span></a>`;
  }).join("");
}

function renderAll() {
  const content = document.getElementById("content");
  content.innerHTML = SECTIONS.map(renderSection).join("");
  renderNav();
  updateProgress();
  applyFilter();
  bindCheckboxes();
}

function updateProgress() {
  const all = allCases();
  const total = all.length;
  const done = all.filter(({ c }) => state[c.id]).length;
  document.getElementById("done-count").textContent = done;
  document.getElementById("total-count").textContent = total;
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  document.getElementById("pct").textContent = pct + "%";
  document.getElementById("fill").style.width = pct + "%";
  // Per-section stats refresh
  for (const sec of SECTIONS) {
    const s = sectionStats(sec);
    const txt = `${s.done}/${s.total}`;
    document
      .querySelectorAll(`[data-stats="${sec.id}"]`)
      .forEach((el) => {
        el.textContent = txt;
        const done = s.done === s.total && s.total > 0;
        el.classList.toggle("done", done);
      });
    document
      .querySelectorAll(`[data-nav-stats="${sec.id}"]`)
      .forEach((el) => {
        el.textContent = txt;
        const parent = el.closest("a");
        parent.classList.toggle("section-done", s.done === s.total && s.total > 0);
      });
  }
}

// Filter + search applied together — both must pass.
function applyFilter() {
  const q = activeSearch.trim().toLowerCase();
  document.querySelectorAll("li.case[data-id]").forEach((row) => {
    const id = row.dataset.id;
    const checked = !!state[id];
    let visible = true;
    if (activeFilter === "pending" && checked) visible = false;
    if (activeFilter === "done" && !checked) visible = false;
    if (visible && q) {
      const hay = row.dataset.search;
      if (!hay.includes(q)) visible = false;
    }
    row.classList.toggle("hidden", !visible);
  });
}

function bindCheckboxes() {
  document
    .querySelectorAll('input[type="checkbox"][data-id]')
    .forEach((input) => {
      input.addEventListener("change", (e) => {
        const id = input.dataset.id;
        if (input.checked) state[id] = true;
        else delete state[id];
        saveState();
        const row = input.closest("li.case");
        row.classList.toggle("done", input.checked);
        updateProgress();
        applyFilter();
      });
    });
  // Click anywhere on the row toggles too (except links).
  document.querySelectorAll("li.case[data-id]").forEach((row) => {
    row.addEventListener("click", (e) => {
      if (e.target.tagName === "A") return;
      if (e.target.matches('input[type="checkbox"]')) return;
      if (e.target.closest(".check")) return;
      const cb = row.querySelector('input[type="checkbox"]');
      cb.checked = !cb.checked;
      cb.dispatchEvent(new Event("change", { bubbles: true }));
    });
  });
}

// ============================================================
// Filter buttons
// ============================================================
document.querySelectorAll("#filter button").forEach((btn) => {
  btn.addEventListener("click", () => {
    activeFilter = btn.dataset.filter;
    localStorage.setItem(FILTER_KEY, activeFilter);
    document
      .querySelectorAll("#filter button")
      .forEach((b) => b.classList.toggle("active", b === btn));
    applyFilter();
  });
});

// ============================================================
// Search
// ============================================================
const searchEl = document.getElementById("search");
searchEl.addEventListener("input", () => {
  activeSearch = searchEl.value;
  localStorage.setItem(SEARCH_KEY, activeSearch);
  applyFilter();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "/" && document.activeElement !== searchEl) {
    e.preventDefault();
    searchEl.focus();
  }
});

// ============================================================
// Reset + export
// ============================================================
document.getElementById("reset-btn").addEventListener("click", () => {
  if (!confirm("Uncheck everything and start over?")) return;
  state = {};
  saveState();
  document
    .querySelectorAll('input[type="checkbox"][data-id]')
    .forEach((cb) => {
      cb.checked = false;
      cb.closest("li.case").classList.remove("done");
    });
  updateProgress();
  applyFilter();
  toast("Reset.");
});

document.getElementById("export-btn").addEventListener("click", () => {
  const lines = [];
  lines.push(`# GymPass test-plan progress — ${new Date().toISOString().slice(0, 16).replace("T", " ")}`);
  lines.push("");
  const all = allCases();
  const done = all.filter(({ c }) => state[c.id]).length;
  lines.push(`Progress: **${done} / ${all.length}** (${Math.round((done / all.length) * 100)}%)`);
  lines.push("");
  for (const sec of SECTIONS) {
    const stats = sectionStats(sec);
    lines.push(`## ${sec.num} · ${sec.title} — ${stats.done}/${stats.total}`);
    const emit = (c) =>
      lines.push(`- [${state[c.id] ? "x" : " "}] ${c.id} — ${c.s.replace(/\*\*/g, "")}`);
    if (sec.cases) sec.cases.forEach(emit);
    if (sec.groups)
      sec.groups.forEach((g) => {
        lines.push(`### ${g.label}`);
        g.cases.forEach(emit);
      });
    lines.push("");
  }
  const text = lines.join("\n");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => toast("Copied to clipboard."),
      () => {
        // Fallback for old browsers — drop into a textarea + execCommand
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        toast("Copied to clipboard.");
      }
    );
  } else {
    // No clipboard API at all → open a popup the user can copy from
    const w = window.open("", "_blank");
    w.document.body.innerText = text;
  }
});

// ============================================================
// Toast
// ============================================================
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 1600);
}

// ============================================================
// Init
// ============================================================
loadState();
renderAll();
// Restore filter / search UI state
document.querySelectorAll("#filter button").forEach((b) => {
  b.classList.toggle("active", b.dataset.filter === activeFilter);
});
searchEl.value = activeSearch;
applyFilter();
</script>
