<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Nav</title>
<style>
.card { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
.block { border: 1px solid var(--gp-border); border-radius: 14px; padding: 14px 16px; background: var(--gp-bg-2); }
.tag-h { font-family: var(--gp-f-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--gp-ink-3); margin-bottom: 10px; }

/* Top nav */
.topnav { display: flex; justify-content: space-between; align-items: center; padding: 4px 2px; }
.wm { font-family: var(--gp-f-display); font-weight: 900; font-style: italic; font-size: 22px; letter-spacing: -0.04em; color: var(--gp-ink); }
.wm em { font-family: var(--gp-f-serif); font-weight: 400; font-style: italic; color: var(--gp-lime); font-size: 19px; }
.wm::after { content:'·'; color: var(--gp-lime); margin-left: 4px; }
.nav-actions { display: flex; gap: 8px; align-items: center; }
.ic-btn { width: 38px; height: 38px; border-radius: 100px; background: var(--gp-bg-3); border: 1px solid var(--gp-border-2); display: flex; align-items: center; justify-content: center; color: var(--gp-ink); position: relative; }
.ic-btn svg { width: 17px; height: 17px; }
.dot-badge { position: absolute; top: 6px; right: 8px; width: 8px; height: 8px; border-radius: 100px; background: var(--gp-lime); box-shadow: 0 0 6px var(--gp-lime); }

/* Tab bar */
.tabs { display: flex; justify-content: space-around; padding: 8px 4px; background: rgba(10,11,10,0.8); backdrop-filter: blur(14px); border-top: 1px solid var(--gp-border); border-radius: 18px; }
.tab { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; padding: 8px 4px; color: var(--gp-ink-4); }
.tab svg { width: 22px; height: 22px; }
.tab span { font-family: var(--gp-f-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }
.tab.active { color: var(--gp-lime); }
.tab.active span { color: var(--gp-lime); }
.tab-fab { width: 54px; height: 54px; border-radius: 100px; background: linear-gradient(180deg, #D5FF7E, #BBFB46); display: flex; align-items: center; justify-content: center; color: #0A0B0A; box-shadow: 0 0 26px -6px rgba(187,251,70,0.6); margin-top: -18px; }
.tab-fab svg { width: 26px; height: 26px; }

/* Segmented */
.seg { display: flex; background: var(--gp-bg-3); border: 1px solid var(--gp-border-2); border-radius: 100px; padding: 4px; gap: 2px; width: fit-content; }
.seg > div { padding: 9px 18px; border-radius: 100px; font-family: var(--gp-f-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gp-ink-3); }
.seg > div.on { background: var(--gp-lime); color: #0A0B0A; font-weight: 700; }
</style></head><body>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<div class="card">
  <div class="block">
    <div class="tag-h">◆ Top nav</div>
    <div class="topnav">
      <div class="wm">GYM<em>pass</em></div>
      <div class="nav-actions">
        <div class="ic-btn"><i data-lucide="search"></i></div>
        <div class="ic-btn"><i data-lucide="bell"></i><div class="dot-badge"></div></div>
      </div>
    </div>
  </div>
  <div class="block">
    <div class="tag-h">◆ Segmented control</div>
    <div class="seg"><div class="on">NEAR ME</div><div>SAVED</div><div>BOOKED</div></div>
  </div>
  <div class="block" style="background: transparent; padding: 0; border: none">
    <div class="tag-h">◆ Tab bar · 5 tabs + center FAB</div>
    <div class="tabs">
      <div class="tab active"><i data-lucide="home"></i><span>Explore</span></div>
      <div class="tab"><i data-lucide="map-pin"></i><span>Map</span></div>
      <div class="tab-fab"><i data-lucide="qr-code"></i></div>
      <div class="tab"><i data-lucide="user"></i><span>Profile</span></div>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
