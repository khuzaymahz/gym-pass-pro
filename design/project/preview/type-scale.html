<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Scale</title>
<style>
.card { padding: 24px; }
table { width: 100%; border-collapse: collapse; }
td { padding: 10px 0; border-bottom: 1px solid var(--gp-border); vertical-align: middle; }
td:first-child { width: 55%; }
td:nth-child(2) { font-family: var(--gp-f-mono); font-size: 11px; color: var(--gp-ink-3); width: 25%; }
td:last-child { font-family: var(--gp-f-mono); font-size: 11px; color: var(--gp-ink-4); text-align: right; }
.d { font-family: var(--gp-f-display); font-weight: 900; font-style: italic; letter-spacing: -0.04em; color: var(--gp-ink); line-height: 1; }
.b { font-family: var(--gp-f-body); color: var(--gp-ink); }
</style></head><body>
<div class="card">
  <table>
    <tr><td><span class="d" style="font-size:56px">DISPLAY</span></td><td>display-l</td><td>56 / -4%</td></tr>
    <tr><td><span class="d" style="font-size:40px">HEADING</span></td><td>display-m</td><td>40 / -3.5%</td></tr>
    <tr><td><span class="d" style="font-size:28px">SUBHEAD</span></td><td>display-s</td><td>28 / -3%</td></tr>
    <tr><td><span class="b" style="font-size:20px; font-weight:600">Title — 20 semibold</span></td><td>title</td><td>20 / 600</td></tr>
    <tr><td><span class="b" style="font-size:17px">Body L — list primary</span></td><td>body-l</td><td>17 / 500</td></tr>
    <tr><td><span class="b" style="font-size:15px">Body M — default</span></td><td>body</td><td>15 / 500</td></tr>
    <tr><td><span class="b" style="font-size:13px; color:var(--gp-ink-3)">Caption — meta copy</span></td><td>caption</td><td>13 / 400</td></tr>
    <tr><td><span class="mono" style="font-size:10px">◆ LABEL — SECTION TAG</span></td><td>label</td><td>10 / 14% tr</td></tr>
  </table>
</div>
</body></html>
