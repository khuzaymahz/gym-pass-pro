<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Class Row</title>
<style>
.card { padding: 24px; display: flex; flex-direction: column; gap: 8px; }
.tag-h { font-family: var(--gp-f-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--gp-ink-3); margin-bottom: 4px; }

.cls { display: grid; grid-template-columns: 80px 1fr auto; gap: 14px; padding: 16px; background: var(--gp-bg-2); border: 1px solid var(--gp-border); border-radius: 14px; align-items: center; }
.cls-time { text-align: left; }
.cls-time .hr { font-family: var(--gp-f-mono); font-size: 22px; font-weight: 600; color: var(--gp-ink); letter-spacing: -0.02em; line-height: 1; }
.cls-time .mer { font-family: var(--gp-f-mono); font-size: 10px; color: var(--gp-ink-3); letter-spacing: 0.18em; margin-top: 4px; }
.cls-time .dur { font-family: var(--gp-f-mono); font-size: 10px; color: var(--gp-ink-4); letter-spacing: 0.1em; margin-top: 6px; }

.cls-body { min-width: 0; }
.cls-cat { font-family: var(--gp-f-mono); font-size: 9px; letter-spacing: 0.16em; color: var(--gp-lime); text-transform: uppercase; }
.cls-name { font-family: var(--gp-f-display); font-weight: 900; font-style: italic; font-size: 18px; color: var(--gp-ink); letter-spacing: -0.02em; text-transform: uppercase; margin-top: 2px; }
.cls-meta { display: flex; gap: 10px; margin-top: 6px; font-family: var(--gp-f-mono); font-size: 11px; color: var(--gp-ink-3); }

.book-btn { background: var(--gp-lime); color: #0A0B0A; font-family: var(--gp-f-display); font-style: italic; font-weight: 900; font-size: 11px; letter-spacing: 0.06em; padding: 10px 16px; border-radius: 100px; border: none; text-transform: uppercase; }
.book-btn.full { background: transparent; color: var(--gp-ink-3); border: 1px solid var(--gp-border-2); }
.book-btn.done { background: rgba(48,209,88,0.14); color: #30D158; }

.avail { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.spots { font-family: var(--gp-f-mono); font-size: 10px; color: var(--gp-ink-3); letter-spacing: 0.1em; }
.spots.low { color: #FFE36B; }
.spots.none { color: #FF6B62; }

.cat-stripe { width: 3px; background: var(--gp-lime); align-self: stretch; border-radius: 100px; }
.cls-yoga .cat-stripe { background: #BF5AF2; }
.cls-yoga .cls-cat { color: #CF85F5; }
.cls-box .cat-stripe { background: #FF453A; }
.cls-box .cls-cat { color: #FF6B62; }
</style></head><body>
<div class="card">
  <div class="tag-h">◆ Class list · time · category stripe · booking state</div>

  <div class="cls">
    <div style="display:flex; gap:10px; align-items:stretch">
      <div class="cat-stripe"></div>
      <div class="cls-time">
        <div class="hr">07:30</div>
        <div class="mer">AM</div>
        <div class="dur">60 MIN</div>
      </div>
    </div>
    <div class="cls-body">
      <div class="cls-cat">CROSSFIT · INTERMEDIATE</div>
      <div class="cls-name">Fran & Friends</div>
      <div class="cls-meta"><span>★ Maya R.</span>·<span>STUDIO 2</span></div>
    </div>
    <div class="avail">
      <span class="spots low">3 SPOTS</span>
      <button class="book-btn">BOOK</button>
    </div>
  </div>

  <div class="cls cls-yoga">
    <div style="display:flex; gap:10px; align-items:stretch">
      <div class="cat-stripe"></div>
      <div class="cls-time">
        <div class="hr">09:00</div>
        <div class="mer">AM</div>
        <div class="dur">75 MIN</div>
      </div>
    </div>
    <div class="cls-body">
      <div class="cls-cat">YOGA · VINYASA</div>
      <div class="cls-name">Morning Flow</div>
      <div class="cls-meta"><span>★ Leo T.</span>·<span>MAIN HALL</span></div>
    </div>
    <div class="avail">
      <span class="spots">12 SPOTS</span>
      <button class="book-btn done">BOOKED ✓</button>
    </div>
  </div>

  <div class="cls cls-box">
    <div style="display:flex; gap:10px; align-items:stretch">
      <div class="cat-stripe"></div>
      <div class="cls-time">
        <div class="hr">06:15</div>
        <div class="mer">PM</div>
        <div class="dur">45 MIN</div>
      </div>
    </div>
    <div class="cls-body">
      <div class="cls-cat">BOXING · ADVANCED</div>
      <div class="cls-name">Power Rounds</div>
      <div class="cls-meta"><span>★ Dom K.</span>·<span>RING 1</span></div>
    </div>
    <div class="avail">
      <span class="spots none">FULL · WAITLIST</span>
      <button class="book-btn full">JOIN LIST</button>
    </div>
  </div>
</div>
</body></html>
