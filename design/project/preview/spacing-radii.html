<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Spacing</title>
<style>
.card { padding: 24px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.h3 { font-family: var(--gp-f-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gp-ink-3); margin-bottom: 12px; }
.sp { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.sp-bar { background: var(--gp-lime); height: 14px; border-radius: 2px; }
.sp-t { font-family: var(--gp-f-mono); font-size: 11px; color: var(--gp-ink-2); }
.rg { display: flex; gap: 10px; align-items: flex-end; margin-top: 6px; }
.rg-box { width: 60px; height: 60px; background: var(--gp-bg-3); border: 1px solid var(--gp-border); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; font-family: var(--gp-f-mono); font-size: 9px; color: var(--gp-ink-3); }
</style></head><body>
<div class="card">
  <div class="row2">
    <div>
      <div class="h3">◆ Spacing · 4px base</div>
      <div class="sp"><div class="sp-bar" style="width: 4px"></div><div class="sp-t">4 — xs · hairline</div></div>
      <div class="sp"><div class="sp-bar" style="width: 8px"></div><div class="sp-t">8 — sm · tight row</div></div>
      <div class="sp"><div class="sp-bar" style="width: 12px"></div><div class="sp-t">12 — md · item gap</div></div>
      <div class="sp"><div class="sp-bar" style="width: 16px"></div><div class="sp-t">16 — lg · card pad</div></div>
      <div class="sp"><div class="sp-bar" style="width: 24px"></div><div class="sp-t">24 — xl · screen pad</div></div>
      <div class="sp"><div class="sp-bar" style="width: 32px"></div><div class="sp-t">32 — 2xl · section</div></div>
      <div class="sp"><div class="sp-bar" style="width: 48px"></div><div class="sp-t">48 — 3xl · hero gap</div></div>
    </div>
    <div>
      <div class="h3">◆ Radii</div>
      <div class="rg">
        <div class="rg-box" style="border-radius:4px">4</div>
        <div class="rg-box" style="border-radius:8px">8</div>
        <div class="rg-box" style="border-radius:14px">14</div>
        <div class="rg-box" style="border-radius:20px">20</div>
      </div>
      <div class="h3" style="margin-top:22px">◆ Usage</div>
      <div style="font-family: var(--gp-f-mono); font-size: 11px; color: var(--gp-ink-2); line-height: 1.8">
        4 · tag pills<br>
        8 · inline chips<br>
        14 · cards, sheets<br>
        20 · pill buttons<br>
        100vh · avatars, FAB
      </div>
    </div>
  </div>
</div>
</body></html>
