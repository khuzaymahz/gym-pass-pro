<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Inputs</title>
<style>
.card { padding: 24px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.block { border: 1px solid var(--gp-border); border-radius: 14px; padding: 16px; background: var(--gp-bg-2); display: flex; flex-direction: column; gap: 10px; }
.tag { font-family: var(--gp-f-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--gp-ink-3); margin-bottom: 4px; }

.search { display: flex; align-items: center; gap: 10px; background: var(--gp-bg-3); border: 1px solid var(--gp-border-2); border-radius: 100px; padding: 12px 16px; }
.search svg { width: 18px; height: 18px; color: var(--gp-ink-3); flex-shrink: 0; }
.search input { background: transparent; border: none; outline: none; color: var(--gp-ink); font-family: var(--gp-f-body); font-size: 14px; flex: 1; }
.search input::placeholder { color: var(--gp-ink-4); }
.search.focus { border-color: var(--gp-lime); box-shadow: 0 0 0 3px rgba(187,251,70,0.12); }
.search.focus svg { color: var(--gp-lime); }

.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-family: var(--gp-f-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--gp-ink-3); }
.field .input { background: var(--gp-bg-3); border: 1px solid var(--gp-border-2); border-radius: 10px; padding: 12px 14px; color: var(--gp-ink); font-family: var(--gp-f-body); font-size: 14px; }

.chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { font-family: var(--gp-f-mono); font-size: 11px; padding: 7px 13px; border-radius: 100px; border: 1px solid var(--gp-border-2); color: var(--gp-ink-2); background: var(--gp-bg-3); }
.chip.on { background: var(--gp-lime); color: #0A0B0A; border-color: var(--gp-lime); font-weight: 600; }

.toggle { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
.tg-label { font-family: var(--gp-f-body); font-size: 13px; color: var(--gp-ink); }
.tg { width: 44px; height: 26px; border-radius: 100px; background: var(--gp-bg-3); border: 1px solid var(--gp-border-2); position: relative; }
.tg::after { content:''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 100px; background: var(--gp-ink-3); }
.tg.on { background: var(--gp-lime); border-color: var(--gp-lime); }
.tg.on::after { left: 20px; background: #0A0B0A; }

.step { display: flex; align-items: center; gap: 12px; }
.st-btn { width: 30px; height: 30px; border-radius: 8px; background: var(--gp-bg-3); border: 1px solid var(--gp-border-2); color: var(--gp-ink); display: flex; align-items: center; justify-content: center; font-size: 16px; }
.st-val { font-family: var(--gp-f-mono); font-size: 14px; color: var(--gp-lime); font-weight: 600; min-width: 30px; text-align: center; }
</style></head><body>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<div class="card">
  <div class="grid">
    <div class="block">
      <div class="tag">◆ Search · default</div>
      <div class="search">
        <i data-lucide="search"></i>
        <input placeholder="Find gyms, studios, classes"/>
      </div>
      <div class="tag">◆ Search · focus</div>
      <div class="search focus">
        <i data-lucide="search"></i>
        <input value="yoga near bedford ave" />
      </div>
      <div class="chips" style="margin-top:6px">
        <span class="chip on">All</span>
        <span class="chip">Gym</span>
        <span class="chip">Yoga</span>
        <span class="chip">Boxing</span>
        <span class="chip">Open now</span>
      </div>
    </div>
    <div class="block">
      <div class="tag">◆ Field · text</div>
      <div class="field">
        <label>EMAIL</label>
        <div class="input">alex@gympass.io</div>
      </div>
      <div class="toggle">
        <span class="tg-label">Face ID check-in</span>
        <div class="tg on"></div>
      </div>
      <div class="toggle">
        <span class="tg-label">Email receipts</span>
        <div class="tg"></div>
      </div>
      <div class="toggle">
        <span class="tg-label" style="display:flex; gap:10px; align-items:center">Guest passes <span class="mono" style="color:var(--gp-ink-3)">2 LEFT</span></span>
        <div class="step">
          <div class="st-btn">−</div>
          <div class="st-val">2</div>
          <div class="st-btn">+</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
