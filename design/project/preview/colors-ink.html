<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Ink</title>
<style>
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.sw { border: 1px solid var(--gp-border); border-radius: 14px; padding: 12px; background: var(--gp-bg-2); }
.chip { height: 70px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--gp-border); display: flex; align-items: center; justify-content: center; font-family: var(--gp-f-display); font-weight: 900; font-style: italic; font-size: 26px; letter-spacing: -0.03em; }
.name { font-family: var(--gp-f-mono); font-size: 11px; color: var(--gp-ink); font-weight: 600; }
.use { font-size: 10px; color: var(--gp-ink-3); margin-top: 4px; line-height: 1.4; }
</style></head><body>
<div class="card">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#1E2221; color:#F4F4F0">Aa</div><div class="name">ink · primary</div><div class="hex">#F4F4F0</div><div class="use">Headings, body copy</div></div>
    <div class="sw"><div class="chip" style="background:#1E2221; color:#CACBC2">Aa</div><div class="name">ink-2</div><div class="hex">#CACBC2</div><div class="use">Secondary body</div></div>
    <div class="sw"><div class="chip" style="background:#1E2221; color:#8E8F86">Aa</div><div class="name">ink-3</div><div class="hex">#8E8F86</div><div class="use">Meta, captions</div></div>
    <div class="sw"><div class="chip" style="background:#1E2221; color:#5A5B54">Aa</div><div class="name">ink-4</div><div class="hex">#5A5B54</div><div class="use">Placeholders, disabled</div></div>
  </div>
</div>
</body></html>
