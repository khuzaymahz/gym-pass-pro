<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Display</title>
<style>
.card { padding: 28px 24px; }
.stack { display: flex; flex-direction: column; gap: 18px; }
.line { border-top: 1px solid var(--gp-border); padding-top: 14px; }
.display { font-family: var(--gp-f-display); font-weight: 900; font-style: italic; letter-spacing: -0.045em; color: var(--gp-ink); line-height: 0.88; }
.serif { font-family: var(--gp-f-serif); font-style: italic; font-weight: 400; letter-spacing: -0.01em; color: var(--gp-lime); }
.meta { display: flex; gap: 20px; margin-top: 6px; }
</style></head><body>
<div class="card">
  <div class="stack">
    <div>
      <div class="display" style="font-size: 72px;">TRAIN<span class="serif" style="font-size:58px">anywhere</span></div>
      <div class="meta"><span class="mono">Archivo Black Italic · 72px · -4.5%</span><span class="mono">+ Instrument Serif Italic · 58px</span></div>
    </div>
    <div class="line">
      <div class="display" style="font-size: 48px;">CHECK IN</div>
      <div class="meta"><span class="mono">Display M · 48px</span><span class="mono">Section heading</span></div>
    </div>
    <div class="line">
      <div class="display" style="font-size: 32px;">YOUR WEEK</div>
      <div class="meta"><span class="mono">Display S · 32px</span><span class="mono">Card title</span></div>
    </div>
  </div>
</div>
</body></html>
