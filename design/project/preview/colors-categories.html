<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Categories</title>
<style>
.card { padding: 24px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.sw { border: 1px solid var(--gp-border); border-radius: 14px; padding: 16px; background: var(--gp-bg-2); position: relative; overflow: hidden; }
.ic {
  width: 64px; height: 64px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.ic img {
  width: 38px; height: 38px; display: block;
  filter: brightness(0) saturate(100%); /* force black on colored chip */
}
.name {
  font-family: var(--gp-f-display); font-weight: 900; font-style: italic;
  font-size: 18px; letter-spacing: -0.025em; color: var(--gp-ink);
  text-transform: uppercase;
}
.hex { font-family: var(--gp-f-mono); font-size: 10px; color: var(--gp-ink-3); margin-top: 3px; letter-spacing: 0.08em; }
.use { font-family: var(--gp-f-mono); font-size: 10px; color: var(--gp-ink-3); margin-top: 6px; letter-spacing: 0.12em; text-transform: uppercase; }
.badge-soon {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 4px;
  background: rgba(255,255,255,0.06);
  color: var(--gp-ink-3);
  font-family: var(--gp-f-mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  border: 1px solid rgba(255,255,255,0.1);
  margin-top: 8px;
}
.dot { width: 5px; height: 5px; border-radius: 100px; background: currentColor; }
.live-chip {
  position: absolute; top: 14px; right: 14px;
  padding: 3px 8px; border-radius: 4px;
  background: rgba(187,251,70,0.12);
  color: #BBFB46;
  font-family: var(--gp-f-mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.14em; border: 1px solid rgba(187,251,70,0.3);
}
.soon-overlay { opacity: 0.7; }
.note {
  font-family: var(--gp-f-mono); font-size: 10px; color: var(--gp-ink-3);
  letter-spacing: 0.14em; text-transform: uppercase;
  margin-top: 16px; text-align: center;
}
</style></head><body>
<div class="card">
  <div class="grid">

    <div class="sw">
      <div class="live-chip"><span class="dot" style="display:inline-block;vertical-align:middle;margin-right:3px;"></span>LIVE</div>
      <div class="ic" style="background:#BBFB46">
        <img src="../assets/icons/cat-gym.png" alt="Gym"/>
      </div>
      <div class="name">Gym</div>
      <div class="hex">#BBFB46 · LIME</div>
      <div class="use">STRENGTH · LIFTING · CARDIO</div>
    </div>

    <div class="sw soon-overlay">
      <div class="ic" style="background:#FF453A">
        <img src="../assets/icons/cat-martial.png" alt="Martial"/>
      </div>
      <div class="name">Martial</div>
      <div class="hex">#FF453A · RED</div>
      <div class="use">BOXING · MMA · BJJ</div>
      <div class="badge-soon">◴ COMING SOON</div>
    </div>

    <div class="sw soon-overlay">
      <div class="ic" style="background:#BF5AF2">
        <img src="../assets/icons/cat-yoga.png" alt="Yoga"/>
      </div>
      <div class="name">Yoga</div>
      <div class="hex">#BF5AF2 · VIOLET</div>
      <div class="use">FLOW · PILATES · MEDITATION</div>
      <div class="badge-soon">◴ COMING SOON</div>
    </div>

  </div>
  <div class="note">● v1.0 SHIPS WITH GYM ONLY · MARTIAL + YOGA RESERVED FOR FUTURE RELEASES</div>
</div>
</body></html>
