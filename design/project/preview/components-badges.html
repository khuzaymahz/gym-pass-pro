<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Badges</title>
<style>
.card { padding: 24px; }
.block { border: 1px solid var(--gp-border); border-radius: 14px; padding: 16px; background: var(--gp-bg-2); }
.tag-h { font-family: var(--gp-f-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--gp-ink-3); margin-bottom: 12px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.row + .row { margin-top: 10px; }

.badge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--gp-f-mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; padding: 5px 10px; border-radius: 5px; }
.b-silver { background: rgba(192,192,192,0.12); color: #D8D8D8; border: 1px solid rgba(192,192,192,0.3); }
.b-gold { background: rgba(255,215,0,0.12); color: #FFE36B; border: 1px solid rgba(255,215,0,0.3); }
.b-plat { background: rgba(220,220,255,0.12); color: #E0E6FF; border: 1px solid rgba(220,220,255,0.3); }
.b-dia { background: rgba(100,210,255,0.12); color: #9EE7FF; border: 1px solid rgba(100,210,255,0.3); }

.pill { display: inline-flex; align-items: center; gap: 6px; font-family: var(--gp-f-mono); font-size: 11px; padding: 5px 10px; border-radius: 100px; }
.p-open { background: rgba(48,209,88,0.14); color: #30D158; }
.p-open::before { content: ''; width: 6px; height: 6px; border-radius: 100px; background: #30D158; box-shadow: 0 0 8px #30D158; }
.p-busy { background: rgba(255,214,10,0.14); color: #FFE36B; }
.p-busy::before { content: ''; width: 6px; height: 6px; border-radius: 100px; background: #FFD60A; }
.p-closed { background: rgba(255,69,58,0.12); color: #FF6B62; }
.p-closed::before { content: ''; width: 6px; height: 6px; border-radius: 100px; background: #FF453A; }

.cat { display: inline-flex; align-items: center; gap: 6px; font-family: var(--gp-f-mono); font-size: 10px; padding: 4px 9px; border-radius: 4px; border: 1px solid; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
.cat-gym { border-color: rgba(187,251,70,0.35); color: #BBFB46; background: rgba(187,251,70,0.06); }
.cat-yoga { border-color: rgba(191,90,242,0.35); color: #CF85F5; background: rgba(191,90,242,0.06); }
.cat-box { border-color: rgba(255,69,58,0.35); color: #FF6B62; background: rgba(255,69,58,0.06); }
.cat-xfit { border-color: rgba(48,209,88,0.35); color: #30D158; background: rgba(48,209,88,0.06); }

.num { display: inline-flex; align-items: center; font-family: var(--gp-f-mono); font-size: 11px; padding: 3px 8px; border-radius: 5px; background: var(--gp-bg-3); color: var(--gp-ink); border: 1px solid var(--gp-border-2); }
.count { background: var(--gp-lime); color: #0A0B0A; font-weight: 700; border: none; }
</style></head><body>
<div class="card">
  <div class="block">
    <div class="tag-h">◆ Tier badges</div>
    <div class="row">
      <span class="badge b-silver">◇ SILVER</span>
      <span class="badge b-gold">◆ GOLD</span>
      <span class="badge b-plat">◈ PLATINUM</span>
      <span class="badge b-dia">◉ DIAMOND</span>
    </div>
    <div class="tag-h" style="margin-top:18px">◆ Status · venue open state</div>
    <div class="row">
      <span class="pill p-open">OPEN · 127 HERE</span>
      <span class="pill p-busy">BUSY</span>
      <span class="pill p-closed">CLOSES 22:00</span>
    </div>
    <div class="tag-h" style="margin-top:18px">◆ Category tags</div>
    <div class="row">
      <span class="cat cat-gym">GYM</span>
      <span class="cat cat-yoga">YOGA</span>
      <span class="cat cat-box">BOXING</span>
      <span class="cat cat-xfit">CROSSFIT</span>
    </div>
    <div class="tag-h" style="margin-top:18px">◆ Numerics & counts</div>
    <div class="row">
      <span class="num">23 / 30 VISITS</span>
      <span class="num">0.4 MI</span>
      <span class="num">12 MIN</span>
      <span class="num count">3 NEW</span>
      <span class="num" style="background:rgba(187,251,70,0.1); color:var(--gp-lime); border-color: rgba(187,251,70,0.3)">★ 4.8</span>
    </div>
  </div>
</div>
</body></html>
