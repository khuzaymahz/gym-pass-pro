<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Venue Card</title>
<style>
.card { padding: 24px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.v { border-radius: 16px; overflow: hidden; background: var(--gp-bg-2); border: 1px solid var(--gp-border); }
.v-img { height: 140px; background: linear-gradient(135deg, #2a3d18, #0A0B0A); position: relative; }
.v-img::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 70% 30%, rgba(187,251,70,0.25), transparent 60%); }
.v-ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--gp-f-mono); font-size: 10px; color: var(--gp-ink-4); letter-spacing: 0.2em; }
.v-top { position: absolute; top: 12px; left: 12px; right: 12px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 2; }
.v-body { padding: 14px; }
.v-cat { font-family: var(--gp-f-mono); font-size: 9px; letter-spacing: 0.16em; color: var(--gp-lime); text-transform: uppercase; }
.v-name { font-family: var(--gp-f-display); font-weight: 900; font-style: italic; font-size: 22px; color: var(--gp-ink); letter-spacing: -0.03em; text-transform: uppercase; margin-top: 2px; line-height: 1; }
.v-meta { display: flex; gap: 10px; margin-top: 10px; font-family: var(--gp-f-mono); font-size: 11px; color: var(--gp-ink-3); }
.v-meta b { color: var(--gp-ink-2); font-weight: 500; }

.pill-s { display: inline-flex; align-items: center; gap: 5px; font-family: var(--gp-f-mono); font-size: 10px; padding: 4px 9px; border-radius: 100px; background: rgba(10,11,10,0.75); backdrop-filter: blur(6px); color: var(--gp-ink); border: 1px solid rgba(255,255,255,0.1); }
.pill-s.open { color: #30D158; }
.pill-s.open::before { content:''; width: 5px; height: 5px; border-radius: 100px; background: #30D158; box-shadow: 0 0 6px #30D158; }
.save { width: 32px; height: 32px; border-radius: 100px; background: rgba(10,11,10,0.7); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
.save svg { width: 15px; height: 15px; color: var(--gp-ink); }
.save.on svg { color: var(--gp-lime); fill: var(--gp-lime); }

/* list row variant */
.row { display: flex; gap: 14px; padding: 14px; background: var(--gp-bg-2); border: 1px solid var(--gp-border); border-radius: 14px; align-items: center; }
.row-thumb { width: 64px; height: 64px; border-radius: 12px; background: linear-gradient(135deg, #2a3d18, #0A0B0A); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--gp-f-mono); font-size: 9px; color: var(--gp-ink-4); }
.row-body { flex: 1; min-width: 0; }
.row-name { font-family: var(--gp-f-display); font-weight: 900; font-style: italic; font-size: 17px; letter-spacing: -0.02em; color: var(--gp-ink); text-transform: uppercase; }
.row-sub { font-family: var(--gp-f-mono); font-size: 11px; color: var(--gp-ink-3); margin-top: 4px; display: flex; gap: 8px; }
.row-go { width: 36px; height: 36px; border-radius: 100px; background: var(--gp-bg-3); display: flex; align-items: center; justify-content: center; color: var(--gp-ink-2); }
.row-go svg { width: 16px; height: 16px; }
</style></head><body>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<div class="card">
  <div class="grid">
    <div class="v">
      <div class="v-img">
        <div class="v-top">
          <span class="pill-s open">OPEN · 24/7</span>
          <div class="save on"><i data-lucide="heart"></i></div>
        </div>
        <div class="v-ph">[ VENUE PHOTO ]</div>
      </div>
      <div class="v-body">
        <div class="v-cat">GYM · STRENGTH</div>
        <div class="v-name">Williamsburg<br>Strength Co.</div>
        <div class="v-meta"><span><b>0.4</b> mi</span>·<span><b>★ 4.8</b></span>·<span>SILVER+</span></div>
      </div>
    </div>
    <div style="display: flex; flex-direction: column; gap: 10px">
      <div class="row">
        <div class="row-thumb">IMG</div>
        <div class="row-body">
          <div class="row-name">Bedford Yoga</div>
          <div class="row-sub"><span>YOGA</span>·<span>0.8 MI</span>·<span style="color:#30D158">OPEN</span></div>
        </div>
        <div class="row-go"><i data-lucide="chevron-right"></i></div>
      </div>
      <div class="row">
        <div class="row-thumb">IMG</div>
        <div class="row-body">
          <div class="row-name">Fortis Boxing</div>
          <div class="row-sub"><span>BOXING</span>·<span>1.2 MI</span>·<span style="color:#FFE36B">BUSY</span></div>
        </div>
        <div class="row-go"><i data-lucide="chevron-right"></i></div>
      </div>
      <div class="row">
        <div class="row-thumb">IMG</div>
        <div class="row-body">
          <div class="row-name">North CrossFit</div>
          <div class="row-sub"><span>CROSSFIT</span>·<span>1.5 MI</span>·<span style="color:#FF6B62">CLOSES 22:00</span></div>
        </div>
        <div class="row-go"><i data-lucide="chevron-right"></i></div>
      </div>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
