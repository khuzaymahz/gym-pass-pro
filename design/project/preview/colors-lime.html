<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Lime</title>
<style>
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.sw { border: 1px solid var(--gp-border); border-radius: 14px; padding: 12px; background: var(--gp-bg-2); }
.chip { height: 110px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--gp-border); }
.name { font-family: var(--gp-f-mono); font-size: 11px; color: var(--gp-ink); font-weight: 600; }
.use { font-size: 10px; color: var(--gp-ink-3); margin-top: 4px; line-height: 1.4; }
.glow { box-shadow: 0 0 40px -10px rgba(187,251,70,0.5); }
</style></head><body>
<div class="card">
  <div class="grid">
    <div class="sw"><div class="chip glow" style="background:#BBFB46"></div><div class="name">lime · primary</div><div class="hex">#BBFB46</div><div class="use">CTAs, active states, brand punch</div></div>
    <div class="sw"><div class="chip" style="background:#D5FF7E"></div><div class="name">lime.light</div><div class="hex">#D5FF7E</div><div class="use">Gradient end, hover</div></div>
    <div class="sw"><div class="chip" style="background:linear-gradient(135deg,#BBFB46,#D5FF7E)"></div><div class="name">lime.gradient</div><div class="hex">#BBFB46 → #D5FF7E</div><div class="use">Primary buttons, visit rings</div></div>
  </div>
</div>
</body></html>
