<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Semantic</title>
<style>
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.sw { border: 1px solid var(--gp-border); border-radius: 14px; padding: 12px; background: var(--gp-bg-2); }
.chip { height: 60px; border-radius: 10px; margin-bottom: 10px; }
.name { font-family: var(--gp-f-mono); font-size: 11px; color: var(--gp-ink); font-weight: 600; }
.use { font-size: 10px; color: var(--gp-ink-3); margin-top: 4px; line-height: 1.4; }
</style></head><body>
<div class="card">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#FF453A"></div><div class="name">danger</div><div class="hex">#FF453A</div><div class="use">Errors, logout, locked</div></div>
    <div class="sw"><div class="chip" style="background:#30D158"></div><div class="name">success</div><div class="hex">#30D158</div><div class="use">Check-in, confirm</div></div>
    <div class="sw"><div class="chip" style="background:#FFD60A"></div><div class="name">warn</div><div class="hex">#FFD60A</div><div class="use">Expiry warning, gold</div></div>
    <div class="sw"><div class="chip" style="background:#61CDFF"></div><div class="name">info</div><div class="hex">#61CDFF</div><div class="use">Info notifs, diamond</div></div>
  </div>
</div>
</body></html>
