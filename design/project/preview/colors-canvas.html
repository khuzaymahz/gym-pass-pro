<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Canvas</title>
<style>
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.sw { border: 1px solid var(--gp-border); border-radius: 14px; padding: 12px; background: var(--gp-bg-2); }
.chip { height: 80px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--gp-border); }
.name { font-family: var(--gp-f-mono); font-size: 11px; color: var(--gp-ink); font-weight: 600; }
.use { font-size: 10px; color: var(--gp-ink-3); margin-top: 4px; line-height: 1.4; }
</style></head><body>
<div class="card">
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#0A0B0A"></div><div class="name">bg / dark</div><div class="hex">#0A0B0A</div><div class="use">Dark canvas</div></div>
    <div class="sw"><div class="chip" style="background:#111312"></div><div class="name">bg-1</div><div class="hex">#111312</div><div class="use">Raised surface</div></div>
    <div class="sw"><div class="chip" style="background:#171A19"></div><div class="name">bg-2 / card</div><div class="hex">#171A19</div><div class="use">Card fill</div></div>
    <div class="sw"><div class="chip" style="background:#1E2221"></div><div class="name">bg-3</div><div class="hex">#1E2221</div><div class="use">Field · input</div></div>
  </div>
</div>
</body></html>
