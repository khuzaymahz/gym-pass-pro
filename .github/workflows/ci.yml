name: ci

# Run on every push to master and every PR targeting master.
# Five parallel jobs — one per code surface plus a docs lint.
# No deploy steps; this is purely a guardrail so a broken commit
# never reaches main.
#
# Tools: pip uv for the backend (matches local dev), node 20 +
# npm for the three Next.js surfaces (admin/partner/website),
# flutter 3.38 for the mobile app.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-flight runs for the same branch when a new commit
# lands — saves minutes on rapid-fire pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────── BACKEND ─────────────────────────
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    services:
      # Tests hit a real Postgres so SQL/migrations are exercised
      # against the actual engine (matches prod's Postgres 16).
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gympass
          POSTGRES_PASSWORD: ci-test-only
          POSTGRES_DB: gympass_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U gympass"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: gympass
      POSTGRES_PASSWORD: ci-test-only
      POSTGRES_DB: gympass_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      JWT_SECRET: ci-test-secret-not-real-not-32-chars
      ADMIN_EXCHANGE_SECRET: ci-test-exchange-secret-also-fake
      APP_ENV: development
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      # `astral-sh/setup-uv` is the official action; pins both uv
      # and the Python version that should be used. Faster than
      # actions/setup-python + pip install uv.
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: uv sync (with dev extras)
        run: uv sync --frozen --all-extras

      - name: alembic upgrade head
        run: uv run alembic upgrade head

      - name: pytest
        run: uv run pytest -q --maxfail=1

  # ───────────────── TYPESCRIPT SURFACES ─────────────────
  # admin / partner / website all share the same node 20 +
  # `npm ci` → `tsc --noEmit` → `next build` pipeline. Splitting
  # into three jobs (vs one matrix) gives clearer failure
  # attribution in the PR check list.
  admin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: admin
    env:
      # Fake values just to satisfy Zod schema during `next build`.
      # No real secrets ever land in CI.
      NEXTAUTH_SECRET: ci-test-nextauth-secret-fake-32-chars
      NEXTAUTH_URL: http://localhost:3001
      ADMIN_EXCHANGE_SECRET: ci-test-admin-exchange-also-fake-32
      API_BASE_URL: http://localhost:8000
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - name: tsc --noEmit
        run: npx tsc --noEmit
      - name: next build
        run: npm run build

  partner:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: gym-partner
    env:
      NEXTAUTH_SECRET: ci-test-nextauth-secret-fake-32-chars
      NEXTAUTH_URL: http://localhost:3003
      ADMIN_EXCHANGE_SECRET: ci-test-admin-exchange-also-fake-32
      API_BASE_URL: http://localhost:8000
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gym-partner/package-lock.json
      - run: npm ci
      - name: tsc --noEmit
        run: npx tsc --noEmit
      - name: next build
        run: npm run build

  website:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - name: tsc --noEmit
        run: npx tsc --noEmit
      - name: next build
        run: npm run build

  # ───────────────────────── MOBILE ─────────────────────────
  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable
      - run: flutter pub get
      # `--no-fatal-warnings` because there are a handful of info-
      # level lints (prefer_const_constructors, require_trailing_commas)
      # tracked but not blocking. Hard errors still fail the job.
      - name: flutter analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos
      - name: flutter test
        run: flutter test --reporter=expanded
