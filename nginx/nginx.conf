user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    # Matches `settings.max_upload_mb` on the backend. Bumping here
    # without bumping there means partners hit a 413 from nginx
    # instead of a clean 400 from the backend; keep in lockstep.
    client_max_body_size 10m;

    gzip              on;
    gzip_types        text/plain application/json application/javascript text/css text/xml application/xml;
    gzip_min_length   1024;

    # Log the real client IP (set by the cloudflare.conf real_ip
    # rewriter below) and Cloudflare's Ray ID for cross-referencing
    # with their dashboard logs.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rid=$sent_http_x_request_id cf=$http_cf_ray';

    access_log /var/log/nginx/access.log main;

    # Cloudflare real-IP rewriting — `http`-block scope so every
    # vhost inherits it without needing its own include.
    include /etc/nginx/conf.d/cloudflare.conf;

    # Websocket upgrade map — used by gitlab.conf (live job logs +
    # web IDE) and any other vhost that proxies long-lived upgrades.
    # Pass-through: when $http_upgrade is empty (normal HTTP request)
    # the Connection header is emitted as `close` rather than the
    # literal string "upgrade", which would otherwise confuse upstreams
    # like GitLab Workhorse.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Per-vhost configs. Loaded explicitly (not via `*.conf` glob)
    # so the order is deterministic and the conf.d directory can
    # hold non-vhost helpers like cloudflare.conf without those
    # being parsed inside the `http` block multiple times.
    include /etc/nginx/conf.d/admin.conf;
    include /etc/nginx/conf.d/api.conf;
    include /etc/nginx/conf.d/partner.conf;
    include /etc/nginx/conf.d/website.conf;
    # mail.conf is always rendered (the staging overlay sets MAIL in
    # NGINX_ENVSUBST_FILTER + a MAIL_DOMAIN default), but the vhost
    # itself fails-soft to 502 when the mail-front container isn't
    # running — see the resolver/variable-upstream pattern in
    # nginx/templates/mail.conf.template for the why.
    include /etc/nginx/conf.d/mail.conf;
    # gitlab.conf follows the same fails-soft pattern as mail.conf —
    # variable proxy_pass + Docker's embedded resolver, so nginx
    # starts cleanly even when the gitlab overlay isn't loaded.
    include /etc/nginx/conf.d/gitlab.conf;
}
