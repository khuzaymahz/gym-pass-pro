# Shared TLS config — included by every gym-pass.net vhost so they all
# present the same Cloudflare Origin Certificate. One cert covers
# `gym-pass.net` and `*.gym-pass.net`, so we don't need per-subdomain
# certs and we don't need the certbot HTTP-01 challenge dance the
# previous (Let's Encrypt) setup used.
#
# The cert + key live on the VM at /etc/nginx/certs/ (mounted into the
# nginx container as :ro). Both files are gitignored at the project
# root — the cert is technically public but the key is not, and
# treating them together as one secret is the safest default.
#
# Cipher suite kept conservative: TLSv1.2+TLSv1.3 only, no SSLv3 or
# TLSv1.1. This is what Cloudflare accepts when its zone-side TLS
# mode is set to "Full (strict)", which is the right pairing for an
# Origin Cert.

ssl_certificate     /etc/nginx/certs/gym-pass.net.pem;
ssl_certificate_key /etc/nginx/certs/gym-pass.net.key;

ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
ssl_prefer_server_ciphers off;

ssl_session_timeout 1d;
ssl_session_cache shared:GymPassSSL:10m;
ssl_session_tickets off;

# Strict-Transport-Security: send on every TLS response, applies to
# subdomains too. Set unconditionally since we control every host on
# the apex; preload-eligible age and inclusion flags.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
