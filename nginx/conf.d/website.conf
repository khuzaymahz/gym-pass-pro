# gym-pass.net + www.gym-pass.net → marketing website (the Claude-Design
# RegisterFlow prototype, served as / by a Next.js rewrite from
# `public/register-flow.html`). The website container runs the
# Next.js standalone runner on port 3004 inside the Docker network;
# nginx reverse-proxies the public TLS termination over to it.
#
# The apex AND www both resolve here. We rewrite `www` → apex via 301
# so the canonical surface is the bare domain (matches the OG tags
# baked into the Metadata API). Cloudflare can also do this redirect
# at the edge with a page rule; doing it here too is belt-and-braces.

upstream website_upstream {
    server website:3004;
}

# Redirect HTTP → HTTPS. Cloudflare will always send HTTPS to the
# origin when the zone TLS mode is Full (strict), but leaving :80
# open serves Cloudflare's own health probes and lets us fall back
# to "Flexible" mode in a pinch without an outage.
server {
    listen 80;
    listen [::]:80;
    server_name gym-pass.net www.gym-pass.net;
    return 301 https://gym-pass.net$request_uri;
}

# Redirect www → apex.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.gym-pass.net;

    include /etc/nginx/snippets/ssl.conf;

    return 301 https://gym-pass.net$request_uri;
}

# Apex — the marketing site.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gym-pass.net;

    include /etc/nginx/snippets/ssl.conf;

    # Generic security headers. The Next.js next.config.js already
    # emits these per response, but nginx-side belt-and-braces means
    # even static files (the APK download, sitemap.xml, robots.txt,
    # /register-flow.html) get them too.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Public scan-redirect path. The printable QR (generated in the
    # gym-partner portal) encodes `https://gym-pass.net/g/<gym-uuid>`
    # so anyone scanning the code with a generic phone camera — i.e.
    # before they have GymPass installed — is taken somewhere sane
    # instead of seeing a "no app handles `gympass:` scheme" prompt.
    #
    # Pre-prod behaviour: 302 to the apex landing. Once the install
    # path is wired up (App Store / Play Store / direct APK), this
    # block becomes a small HTML responder that branches on
    # User-Agent and falls through to the apex only for desktops.
    # Note: 302 (not 301) so we can change the destination without
    # caches pinning the redirect to the wrong URL.
    location /g/ {
        return 302 https://gym-pass.net/;
    }

    # APK download — explicit content-type + attachment so mobile
    # browsers offer "Install" instead of trying to render bytes.
    # The file itself lands here via `scripts/build-apk.sh`. The
    # 24h cache is long enough that returning visitors don't re-
    # download, short enough that a fresh build propagates fast.
    location = /downloads/gympass.apk {
        proxy_pass         http://website_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header Content-Type "application/vnd.android.package-archive" always;
        add_header Content-Disposition 'attachment; filename="gympass.apk"' always;
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
    }

    location / {
        proxy_pass         http://website_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
