# api.gym-pass.net → FastAPI backend on :8000. WebSocket upgrade
# handled separately on `/api/v1/realtime/ws` with a long read
# timeout so live updates survive idle.

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.gym-pass.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.gym-pass.net;

    include /etc/nginx/snippets/ssl.conf;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # WebSocket fan-out for live partner-dashboard updates. Must come
    # BEFORE the generic `location /` so the upgrade headers are set
    # on this specific path; nginx picks the most specific prefix
    # match. `proxy_read_timeout` is bumped to ~1h so a long-lived
    # WebSocket doesn't get idle-killed; the client pings every
    # ~25s for liveness regardless.
    location = /api/v1/realtime/ws {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
