upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name api.gym-pass.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.gym-pass.net;

    ssl_certificate     /etc/letsencrypt/live/api.gym-pass.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gym-pass.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # WebSocket fan-out for live updates. Must come BEFORE the
    # generic `location /` so the upgrade headers are set on this
    # specific path; nginx picks the most specific prefix match.
    # `proxy_read_timeout` is bumped to ~1 hour so a long-lived
    # WebSocket connection doesn't get idle-killed; the client
    # still sends a `ping` every ~25 s for liveness.
    location = /api/v1/realtime/ws {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
