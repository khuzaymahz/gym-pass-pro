name: gympass
description: GymPass mobile app — multi-gym access for members.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2

  # Biometric unlock for the saved-credential vault. Falls back to the OS
  # PIN/passcode when fingerprint/face is unavailable, never plaintext.
  local_auth: ^2.3.0

  # Password hashing for the on-device "remembered password" marker. Real
  # backend uses argon2id; mobile only stores SHA-256 so the local copy
  # never carries the plaintext secret used at login time.
  crypto: ^3.0.3

  # Router
  go_router: ^14.6.0

  # QR
  mobile_scanner: ^5.2.3

  # Google Sign-In on Android. The OAuth client id created in Google
  # Cloud is referenced via `serverClientId` so the mobile mints an
  # ID token the backend's JWKS verifier can accept.
  google_sign_in: ^6.2.1

  # Device GPS for the Explore tab — picks the member's region (Amman /
  # Zarqa / ...) for the static-map preview centre and powers the
  # per-gym distance pills. Permission is asked the first time the tab
  # opens; denial silently falls back to the Amman default region.
  geolocator: ^13.0.1

  # Native share sheet — invite link + gym detail share buttons hand
  # off to the OS picker (WhatsApp, Messages, Mail, etc.) instead of
  # silently copying to clipboard. iOS gets UIActivityViewController,
  # Android gets the system chooser.
  share_plus: ^10.1.0

  # Realtime WebSocket — the partner-portal-driven live update
  # channel (`/api/v1/realtime/ws`). Reconnecting client lives in
  # `core/realtime/realtime_client.dart`; the package itself is
  # the lower-level transport.
  web_socket_channel: ^3.0.1

  # Interactive map — pure-Flutter renderer over a tile provider's
  # raster tiles. Picked over `google_maps_flutter` because:
  #   - Markers are real Flutter widgets, so we render the gym's
  #     logo + tier ring directly (vs. building a circular bitmap
  #     and converting to BitmapDescriptor on every gym).
  #   - Lighter: no platform view, no native SDK init, ~5× faster
  #     cold start, ~20× smaller APK contribution.
  #   - Free: tiles served by CARTO basemaps (no API key required
  #     at our scale; Stadia/Mapbox is a one-line swap for higher
  #     volume).
  #   - Custom-styled tiles match the app's dark/light palette out
  #     of the box (Voyager / Dark Matter — designed for app UIs).
  # `latlong2` is flutter_map's coordinate type; small dep, just
  # the LatLng class.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Image caching — disk + memory cache for `/api/v1/gyms/.../photos`
  # and partner-uploaded logos. Backed by `flutter_cache_manager`
  # (LRU disk cache with a 30-day TTL by default), so the hero photo
  # slider and gym logos don't re-download on every cold launch and
  # don't decode the full-resolution JPEG into RAM when we're only
  # displaying a 400-px-wide slot.
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  generate: false

  assets:
    - assets/fonts/

  fonts:
    - family: Archivo
      fonts:
        - asset: assets/fonts/Archivo-VariableFont_wdth_wght.ttf
        - asset: assets/fonts/Archivo-Italic-VariableFont_wdth_wght.ttf
          style: italic
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz_wght.ttf
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz_wght.ttf
          style: italic
    - family: InstrumentSerif
      fonts:
        - asset: assets/fonts/InstrumentSerif-Regular.ttf
        - asset: assets/fonts/InstrumentSerif-Italic.ttf
          style: italic
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-VariableFont_slnt_wght.ttf
