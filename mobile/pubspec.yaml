name: gympass
description: GymPass mobile app — multi-gym access for members.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2

  # Fast unencrypted prefs store — used ONLY for the cold-start
  # values (locale, themeMode) that the splash needs synchronously
  # before the first frame paints. secure_storage is the wrong
  # tool for these reads: its ~500–1500 ms Keystore init blocks
  # startup, and the values themselves aren't secrets. Everything
  # else (tokens, biometric vault) stays on secure_storage.
  shared_preferences: ^2.3.2

  # Biometric unlock for the saved-credential vault. Falls back to the OS
  # PIN/passcode when fingerprint/face is unavailable, never plaintext.
  local_auth: ^2.3.0

  # Password hashing for the on-device "remembered password" marker. Real
  # backend uses argon2id; mobile only stores SHA-256 so the local copy
  # never carries the plaintext secret used at login time.
  crypto: ^3.0.3

  # Router
  go_router: ^14.6.0

  # QR
  mobile_scanner: ^5.2.3

  # Google Sign-In on Android. The OAuth client id created in Google
  # Cloud is referenced via `serverClientId` so the mobile mints an
  # ID token the backend's JWKS verifier can accept.
  google_sign_in: ^6.2.1

  # Device GPS for the Explore tab — picks the member's region (Amman /
  # Zarqa / ...) for the static-map preview centre and powers the
  # per-gym distance pills. Permission is asked the first time the tab
  # opens; denial silently falls back to the Amman default region.
  geolocator: ^13.0.1

  # Native share sheet — invite link + gym detail share buttons hand
  # off to the OS picker (WhatsApp, Messages, Mail, etc.) instead of
  # silently copying to clipboard. iOS gets UIActivityViewController,
  # Android gets the system chooser.
  share_plus: ^10.1.0

  # Realtime WebSocket — the partner-portal-driven live update
  # channel (`/api/v1/realtime/ws`). Reconnecting client lives in
  # `core/realtime/realtime_client.dart`; the package itself is
  # the lower-level transport.
  web_socket_channel: ^3.0.1

  # Interactive map — pure-Flutter renderer over a tile provider's
  # raster tiles. Picked over `google_maps_flutter` because:
  #   - Markers are real Flutter widgets, so we render the gym's
  #     logo + tier ring directly (vs. building a circular bitmap
  #     and converting to BitmapDescriptor on every gym).
  #   - Lighter: no platform view, no native SDK init, ~5× faster
  #     cold start, ~20× smaller APK contribution.
  #   - Free: tiles served by CARTO basemaps (no API key required
  #     at our scale; Stadia/Mapbox is a one-line swap for higher
  #     volume).
  #   - Custom-styled tiles match the app's dark/light palette out
  #     of the box (Voyager / Dark Matter — designed for app UIs).
  # `latlong2` is flutter_map's coordinate type; small dep, just
  # the LatLng class.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # `http` is a transitive dep via flutter_map's NetworkTileProvider;
  # declared explicitly because the resilient tile-provider wrapper
  # in features/gyms/presentation/widgets/resilient_tile_provider.dart
  # imports it directly (timeout-on-send pattern).
  http: ^1.2.2

  # Phone / email / WhatsApp deep-link launcher. Used by the support
  # page to open `tel:`, `mailto:` and `wa.me/` URIs in the OS apps
  # (dialer, Gmail, WhatsApp) with pre-filled subjects + bodies,
  # so a tap doesn't just copy text to clipboard.
  url_launcher: ^6.3.0

  # Camera + gallery picker. Used by the bug-report attach-evidence
  # flow so "Take a photo" opens the camera and "Photo from camera
  # roll" opens the OS picker. Previously the sheet just set a fake
  # filename; image_picker is what turns it into an end-to-end real
  # attachment flow.
  image_picker: ^1.1.2

  # Incoming deep-link receiver. Listens for both cold-start ("app
  # opened by tapping a link") and hot ("app already running, OS
  # routes a link in") events. Used to handle `gympass://gyms/<slug>`
  # custom-scheme URLs and `https://gym-pass.net/gyms/<slug>` /
  # `/invite/<code>` web URLs when the OS hands them off to the app
  # (Android intent-filter / iOS Universal Link). Pure event stream;
  # no UI of its own.
  app_links: ^6.3.2

  # Real network-state detection. Drives the offline banner, the
  # "you're offline, here's your cached list" empty-states, and
  # auto-invalidation of cached providers when connectivity is
  # restored. Replaces the previous "fetch returned empty" guess at
  # offline state — which couldn't distinguish "we couldn't reach
  # the backend" from "the backend says there are zero gyms."
  connectivity_plus: ^6.0.5

  # Crash + error reporting. Init is a no-op when SENTRY_DSN is
  # unset (passed via --dart-define at build time), so the SDK
  # ships baked into every APK but contributes zero overhead until
  # operators flip the env on. Per CLAUDE.md §15 Sentry is
  # "deferred until a real provider is chosen" — this is the
  # wiring so flipping it on later is one build-time flag, not a
  # code change.
  sentry_flutter: ^8.10.0

  # Image caching — disk + memory cache for `/api/v1/gyms/.../photos`
  # and partner-uploaded logos. Backed by `flutter_cache_manager`
  # (LRU disk cache with a 30-day TTL by default), so the hero photo
  # slider and gym logos don't re-download on every cold launch and
  # don't decode the full-resolution JPEG into RAM when we're only
  # displaying a 400-px-wide slot.
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.1

  # Generates every Android density bucket + every iOS @1x/@2x/@3x
  # size from the two source PNGs in assets/branding/. Run with
  # `dart run flutter_launcher_icons` whenever the source icons
  # change. The generated PNGs are committed (the generator runs
  # at dev-time, not at app-build time) so flutter build doesn't
  # depend on the package.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  # Generated app_localizations*.dart files in lib/l10n are committed
  # to the repo. Re-generate by temporarily flipping this to `true`,
  # running `flutter gen-l10n --arb-dir=lib/l10n --template-arb-file=app_en.arb
  # --output-dir=lib/l10n --output-localization-file=app_localizations.dart
  # --output-class=AppLocalizations`, then flipping back.
  generate: false

  assets:
    - assets/fonts/
    - assets/branding/

  fonts:
    - family: Archivo
      fonts:
        - asset: assets/fonts/Archivo-VariableFont_wdth_wght.ttf
        - asset: assets/fonts/Archivo-Italic-VariableFont_wdth_wght.ttf
          style: italic
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz_wght.ttf
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz_wght.ttf
          style: italic
    - family: InstrumentSerif
      fonts:
        - asset: assets/fonts/InstrumentSerif-Regular.ttf
        - asset: assets/fonts/InstrumentSerif-Italic.ttf
          style: italic
    # Tajawal — primary Arabic family across the app. Replaces
    # Cairo for body, headlines, and labels: cleaner letterforms,
    # better x-height for small UI sizes, and more breathing room
    # at body. Five static weights bundled to match the same range
    # the variable Cairo file gave us (300 / 400 / 500 / 700 / 800).
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Light.ttf
          weight: 300
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-ExtraBold.ttf
          weight: 800
    # Cairo kept as the Arabic fallback only — if Tajawal lacks a
    # glyph (e.g. a rare ligature) the system picks Cairo next
    # instead of dropping to Roboto's smaller-quality AR rendering.
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-VariableFont_slnt_wght.ttf

# ─── App icons ────────────────────────────────────────────────────
# Light/dark theme-aware launcher icons.
#
# Source images live in `assets/branding/`:
#   - app_icon_light.png  (1024×1024, white background)
#   - app_icon_dark.png   (1024×1024, black background)
#
# Generate every Android density bucket + every iOS @1x/@2x/@3x
# size from those two PNGs with:
#
#   dart run flutter_launcher_icons
#
# On iOS 18+ the system swaps between light and dark variants
# automatically based on Settings → Display & Brightness. On older
# iOS we ship the light variant only (Apple's appearances API
# didn't exist before iOS 18). On Android 13+ the system's
# "themed icons" feature can monochrome-tint the foreground; the
# monochrome layer is the same dumbbell glyph isolated from the
# light icon.
flutter_launcher_icons:
  # iOS — light is the default; dark is picked up via the
  # appearances mechanism that flutter_launcher_icons writes into
  # AppIcon.appiconset/Contents.json.
  ios: true
  remove_alpha_ios: true
  image_path: "assets/branding/app_icon_light.png"
  image_path_ios_dark_transparent: "assets/branding/app_icon_dark.png"

  # Android — adaptive icon (Android 8+) with the lime brand colour
  # as the background and the wordmark as the foreground. The
  # monochrome layer feeds Android 13+ themed icons.
  android: "ic_launcher"
  adaptive_icon_background: "#FAFAF9"
  adaptive_icon_foreground: "assets/branding/app_icon_light.png"
  adaptive_icon_monochrome: "assets/branding/app_icon_light.png"
  min_sdk_android: 21
