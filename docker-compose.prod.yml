# Production overlay. Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                  --env-file .env.prod up -d --build
#
# Differences from the dev compose:
#   - db / redis / backend / admin / gym-partner / website all DROP
#     their host-published ports (`!reset []`). Only nginx publishes
#     80/443. Everything else is reachable only on the internal Docker
#     network. This is the load-bearing security boundary — if any of
#     these get re-published, raw Postgres / Redis / backend become
#     internet-reachable.
#   - APP_ENV is sourced from .env.prod (defaults to "development"
#     because the pre-prod brief is: no real SMS, no real payments,
#     dev OTP "1234" works, just enough infra to test the mobile
#     build against the real subdomains).
#   - certbot is gone. TLS is terminated with a Cloudflare Origin
#     Certificate mounted from ./nginx/certs (gitignored). Valid 15
#     years; no renewal automation needed.
#   - website service added — Next.js shell serving the Claude-Design
#     RegisterFlow prototype (public/register-flow.html) at the apex
#     gym-pass.net, plus the /downloads/gympass.apk artefact.

services:
  db:
    ports: !reset []
    restart: always

  redis:
    ports: !reset []
    restart: always

  backend:
    restart: always
    # gunicorn with uvicorn workers — 4 is right for the small pre-prod
    # VM. Tune up only after observing CPU sat under load.
    command: ["uv", "run", "gunicorn", "app.main:app", "-k", "uvicorn.workers.UvicornWorker", "-b", "0.0.0.0:8000", "-w", "4", "--access-logfile", "-"]
    volumes:
      - media_data:/app/media
    ports: !reset []
    environment:
      APP_ENV: ${APP_ENV:-development}

  celery-worker:
    restart: always
    volumes: !reset []

  celery-beat:
    restart: always
    volumes: !reset []

  admin:
    build:
      context: ./admin
      target: runner
      # Build-time secrets — admin's lib/env.ts validates these via
      # Zod at module load; the build can't finish without them.
      # Not baked into the runtime bundle (the runner reads them
      # fresh from env_file at container start).
      args:
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        ADMIN_EXCHANGE_SECRET: ${ADMIN_EXCHANGE_SECRET}
    restart: always
    volumes: !reset []
    ports: !reset []
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN:-api.gym-pass.net}
      BACKEND_API_URL: http://backend:8000
      NEXTAUTH_URL: https://${ADMIN_DOMAIN:-admin.gym-pass.net}

  gym-partner:
    build:
      context: ./gym-partner
      target: runner
      args:
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        ADMIN_EXCHANGE_SECRET: ${ADMIN_EXCHANGE_SECRET}
    restart: always
    volumes: !reset []
    ports: !reset []
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN:-api.gym-pass.net}
      NEXTAUTH_URL: https://${PARTNER_DOMAIN:-partner.gym-pass.net}

  website:
    build:
      context: ./website
      target: runner
    restart: always
    volumes: !reset []
    ports: !reset []
    environment:
      NODE_ENV: production

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      # Cloudflare Origin Cert + private key, copied to the VM at
      # deploy time. Gitignored. Cert can be world-readable (0644);
      # key MUST be 0600 root:root (or the corresponding nginx user
      # inside the container). See docs/deploy.md.
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - admin
      - gym-partner
      - website
