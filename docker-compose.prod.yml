# Production overlay. Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    ports: !reset []
    restart: always

  redis:
    ports: !reset []
    restart: always

  backend:
    restart: always
    command: ["uv", "run", "gunicorn", "app.main:app", "-k", "uvicorn.workers.UvicornWorker", "-b", "0.0.0.0:8000", "-w", "4", "--access-logfile", "-"]
    volumes:
      - media_data:/app/media
    ports: !reset []
    environment:
      APP_ENV: production

  celery-worker:
    restart: always
    volumes: !reset []

  celery-beat:
    restart: always
    volumes: !reset []

  admin:
    build:
      context: ./admin
      target: runner
    restart: always
    volumes: !reset []
    ports: !reset []
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN:-api.gym-pass.net}
      BACKEND_API_URL: http://backend:8000
      NEXTAUTH_URL: https://${ADMIN_DOMAIN:-admin.gym-pass.net}

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
      - admin

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  certbot_certs:
  certbot_www:
